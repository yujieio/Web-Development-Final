{% extends "base.html" %}

{% block content %}
<div class="skills-page-bg">
    <div class="container-fluid py-5">
        <div class="container py-5">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold font-oswald mb-3 text-dark">EDIT SKILLS POST</h1>
                <p class="lead text-dark" style="opacity: 0.8;">Update your skills post</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4 p-lg-5">
                            <form method="POST" action="{{ url_for('edit_skill', post_id=post.id) }}">
                                {% include '_profile_info_posting.html' %}

                                <div class="mb-4">
                                    <label class="form-label fw-semibold text-dark" for="title">Title *</label>
                                    <input class="form-control" id="title" name="title" type="text" 
                                           value="{{ post.title }}" placeholder="e.g., Teach basic smartphone skills" required minlength="3">
                                    <small class="text-muted">Minimum 3 characters</small>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold text-dark" for="description">Description *</label>
                                    <textarea class="form-control" id="description" name="description" rows="6" 
                                              placeholder="Describe what you want to offer or request..." required>{{ post.description }}</textarea>
                                </div>

                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold text-dark" for="category">Category *</label>
                                        <select class="form-select" id="category" name="category" required>
                                            <option value="" disabled>Choose…</option>
                                            <option value="Technology" {% if post.category == 'Technology' %}selected{% endif %}>Technology</option>
                                            <option value="Life Skills" {% if post.category == 'Life Skills' %}selected{% endif %}>Life Skills</option>
                                            <option value="Health" {% if post.category == 'Health' %}selected{% endif %}>Health</option>
                                            <option value="Language" {% if post.category == 'Language' %}selected{% endif %}>Language</option>
                                            <option value="Hobbies" {% if post.category == 'Hobbies' %}selected{% endif %}>Hobbies</option>
                                            <option value="Other" {% if post.category == 'Other' %}selected{% endif %}>Other</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold text-dark" for="skill_type">Post Type *</label>
                                        <select class="form-select" id="skill_type" name="skill_type" required>
                                            <option value="" disabled>Choose…</option>
                                            <option value="Offer" {% if post.skill_type == 'Offer' %}selected{% endif %}>Offer</option>
                                            <option value="Request" {% if post.skill_type == 'Request' %}selected{% endif %}>Request</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                                    <form method="POST" action="{{ url_for('delete_skill', post_id=post.id) }}" 
                                          onsubmit="return confirm('Are you sure you want to delete this post?');" 
                                          class="d-inline">
                                        <button class="btn btn-outline-danger rounded-pill px-4" type="submit">
                                            <i class="bi bi-trash me-2"></i>Delete
                                        </button>
                                    </form>
                                    <div>
                                        <a class="btn btn-outline-dark rounded-pill px-4 me-2" href="{{ url_for('skill_detail', post_id=post.id) }}">
                                            <i class="bi bi-x-circle me-2"></i>Cancel
                                        </a>
                                        <button class="btn btn-dark rounded-pill px-5" type="submit">
                                            <i class="bi bi-check2-circle me-2"></i>Save Changes
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
